
<!DOCTYPE html>
<html>
<body>
<h3 id="status">Initialising data…</h3>

<script>
Promise.all([
  fetch("./cat.json"),
  fetch("./meta.json"),
  fetch("./chunk1.json"),
  fetch("./chunk2.json"),
  fetch("./chunk3.json")
])
.then(() => {
  document.getElementById("status").innerText = "✅ Data loaded";
})
.catch(e => {
  document.getElementById("status").innerText = "❌ Data failed";
});
</script>

</body>
</html>
